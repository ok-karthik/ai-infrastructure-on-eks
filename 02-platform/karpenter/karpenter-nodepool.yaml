apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: user-gp-pool
spec:
  template:
    spec:
      expireAfter: 720h # Moved to spec.template.spec in v1 (stable)
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"] # Launch cheap Spot instances
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["t3.small", "c7i-flex.large", "m7i-flex.large"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: user-gp-pool
  limits:
    cpu: 10
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
