apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: user-gp-pool
spec:
  amiFamily: AL2023 # Amazon Linux 2023
  role: dev-eks-cluster-karpenter-node-role # Node IAM role created via Terraform
  amiSelectorTerms:
    - alias: al2023@latest
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: dev-eks-cluster
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: dev-eks-cluster
